name: Bug Report
description: Report a bug in OpenAlpha
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `python cli.py analyze "..."`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (API/CLI)
        - Frontend (Web UI)
        - Ingestion pipeline
        - Search / Knowledge base
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, LLM provider, etc.
      placeholder: |
        - OS: macOS 14.0
        - Python: 3.11.5
        - LLM Provider: anthropic
    validations:
      required: false
